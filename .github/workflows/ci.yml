name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project and dev dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: python -m ruff check adsmind tests streamlit_app.py research

  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.11"
          - os: macos-latest
            python-version: "3.11"
    runs-on: ${{ matrix.os }}

    env:
      MPLCONFIGDIR: .matplotlib-ci
      TOKENIZERS_PARALLELISM: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project and dev dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Compile sources
        run: python -m compileall adsmind tests streamlit_app.py research

      - name: Run preflight
        run: adsmind-preflight --ci

      - name: Run unit tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v
